# =============================================================================
# CSF ACTIONS FILE - Refani–Nagao spun pile onion/rebars model
# =============================================================================
# Source geometry:
#   Refani, A.N.; Nagao, T. (2023).
#   Corrosion Effects on the Mechanical Properties of Spun Pile Materials.
#   Applied Sciences, 13, 1507.
#
# Documented section data used by this CSF case:
#   - closed-ended circular hollow spun pile section
#   - outer diameter: 600 mm  -> R_ext = 0.300 m
#   - wall thickness: 100 mm
#   - inner diameter: 400 mm  -> R_int = 0.200 m
#   - cover concrete thickness: 50 mm
#   - single layer of 32 PC-bars, diameter 9 mm
#   - helix-shaped transverse rebars, diameter 4 mm, spacing 120 mm
#
# CSF modelling choice:
#   The documented cover/core wall is represented by a radial onion idealization:
#     void:             R = 0.000 -> 0.200 m
#     core_inner:       R = 0.200 -> 0.225 m
#     pcbar_host_layer: R = 0.225 -> 0.250 m
#     cover_inner:      R = 0.250 -> 0.275 m
#     cover_outer:      R = 0.275 -> 0.300 m
#
#   The 32 PC-bars are modelled as discrete embedded zones on an explicit guide
#   circle. The helix-shaped transverse reinforcement is not modelled as geometry;
#   its equivalent effect, if used, should be assigned later through the
#   shear_weight_law of the appropriate annular layer.
#
# Member length:
#   L = 20.0 m is a CSF demonstration parameter, not a section dimension from
#   the cited paper.
# =============================================================================

CSF_ACTIONS:

  stations:
    # -------------------------------------------------------------------------
    # Boundary stations of the CSF field. The section is prismatic in geometry;
    # S0 and S1 use the same onion/rebar section. Longitudinal variation, if
    # introduced, is carried by weight_laws and shear_weight_laws.
    # -------------------------------------------------------------------------
    station_edges:
      - 0.00
      - 20.00

    # Representative station for visual cross-section inspection.
    station_middle:
      - 10.00

    # -------------------------------------------------------------------------
    # Stations selected for model-level inspection. These are not taken from
    # the Refani–Nagao paper; they are CSF case stations chosen to inspect a
    # possible marine exposure field along the member.
    # -------------------------------------------------------------------------
    station_precise:
      - 0.00
      - 1.00
      - 3.00
      - 3.50
      - 4.50
      - 5.50
      - 10.00
      - 15.00
      - 20.00

  actions:

    # -------------------------------------------------------------------------
    # 3-D volume render of the prismatic spun pile CSF model.
    # The visible longitudinal variation is geometric only if later laws change
    # the displayed field; the base geometry itself is constant between S0/S1.
    # -------------------------------------------------------------------------
    - plot_volume_3d:
        params:
          seed: w
          title: "Pile CSF onion/rebars model"
          line_percent: 20.0

    # -------------------------------------------------------------------------
    # Section analysis at selected stations.
    #
    # Reported quantities are axial/bending section quantities. No Saint-Venant
    # torsion constant is requested here, because the intended heterogeneous CSF
    # model may use independent weight_law and shear_weight_law fields.
    # -------------------------------------------------------------------------
    - section_selected_analysis:
        stations: station_precise
        output:
          - [stdout,out/spun_pile_section_properties.txt]
        properties:
          [A, Cx, Cy, Ix, Iy, Ixy, Ip, I1, I2,J_sv_cell,rx, ry, Wx, Wy, Q_na]

    # -------------------------------------------------------------------------
    # 2-D section plot at mid-height.
    # Shows the onion layers and the 32 embedded PC-bars.
    # -------------------------------------------------------------------------
    - plot_section_2d:
        stations:
          - station_middle
        show_ids: false
        show_vertex_ids: false
        output:
          - [stdout, out/spun_pile_refani_section.jpg]

    # -------------------------------------------------------------------------
    # Longitudinal property plots.
    # With geometry-only YAML these curves are expected to be constant along z.
    # After degradation laws are added, the same action will show the resulting
    # CSF property fields along the member.
    # -------------------------------------------------------------------------
    - plot_properties:
        output:
          - stdout
          - out/spun_pile_refani_properties.jpg
        params:
          num_points: 200
        properties: [A, Cx, Cy, Ix, Iy, Ixy,J_sv_cell]
    - plot_weight:
        output: [out/weights.png]
    - plot_shear_weight:
        output: [out/shear_weights.png]
