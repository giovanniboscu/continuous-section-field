CSF_ACTIONS:
  stations:
    station_midle:
      - 42.5
    station_edge:
      - 0
      - 175
    station_10:
      - 10
    station_sparse:
      - 0
      - 3
      - 5
      - 7
      - 10
      - 50
      - 175

  actions:
    - plot_volume_3d:
        params:
          line_percent: 100.0
          title: "ekifisk"

    - section_selected_analysis:
        stations: station_edge
        output:
          - stdout
          - out/section_selected_analysi_sekifisk.txt
        properties: [A,Iy,Ip,K_torsion,Q_na]

    - plot_section_2d:
        stations:
          - station_edge
        show_ids: True
        show_vertex_ids: True
        output:
          - [stdout,out/one_pol_ekofisk_sections.jpg]

    - plot_properties:
        output:
          - stdout
          - out/ekofisk.jpg
        params:
          num_points: 200
        properties: [A,Iy,Ip,K_torsion,Q_na]
    - plot_weight:
        output:
          - stdout
          - out/ekofisk_weight.jpg
        params:
          num_points: 500
