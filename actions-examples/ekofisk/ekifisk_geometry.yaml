# CSF Benchmark — Ekofisk Foundation Pile (Steel)
#
# 1) Objective
# Numerical benchmark case for validating CSF section-property evolution
# of a steel tubular pile with localized splash-zone degradation.
#
# 2) Modeling Context
# - Circular hollow steel pile (CHS)
# - Total modeled length: 175 m
# - Station-based evaluation along local axis z
#
# 3) Material (Steel)
# - E  = 210 GPa
# - nu = 0.30
# - rho = 7850 kg/m^3
# - fy = 345 MPa (benchmark card)
#
# 4) Geometry Reference
# - Outer diameter: Do = 2.4 m
# - Inner diameter: Di(z) = Do - 2*t(z)
# - Wall thickness t(z): explicitly defined in the model
#
# 5) Degradation Weight Law 
#  See below at "weight_laws:" key
#
# Example parameter set:
# beta = 0.35
# z0   = 5.0 m
# sigma= 2.0 m
#
# 6) Recommended Stations to Highlight Degradation
# z = [0, 3, 5, 7, 10, 50, 175]
# - z=5: expected maximum degradation
# - z=3 and z=7: symmetry check around z0
# - z=50 and z=175: near-undamaged reference plateau
#
# 7) Key CSF Properties to Track
# - A, Ix, Iy, J
# - optional: J_sv_cell (if that torsion path is enabled)
#
# 8) Engineering Reading of Results
# - Minimum properties are expected near z ~ z0
# - Progressive recovery away from z0
# - Use degraded vs reference stations to report % reduction
#
# 9) Traceability Rules
# - Tag each parameter as [Measured], [Inferred], or [Assumed]
# - Suitable for benchmarking/sensitivity studies
# - Not suitable as certified as-built documentation
#
# Note: S0 and S1 share identical vertex coordinates.
# This is intentional — the pile has constant outer diameter along z.
# Geometry variation is handled entirely by the weight law below.
CSF:
  sections:
    S0:
      z: 0.000000
      polygons:
        outer:
          weight: 1.000000
          vertices:
            - [2.000000, 0.000000]
            - [1.618034, 1.175571]
            - [0.618034, 1.902113]
            - [-0.618034, 1.902113]
            - [-1.618034, 1.175571]
            - [-2.000000, 0.000000]
            - [-1.618034, -1.175571]
            - [-0.618034, -1.902113]
            - [0.618034, -1.902113]
            - [1.618034, -1.175571]
        inner_void:
          weight: 0.000000
          vertices:
            - [1.700000, 0.000000]
            - [1.375329, 0.999235]
            - [0.525329, 1.616796]
            - [-0.525329, 1.616796]
            - [-1.375329, 0.999235]
            - [-1.700000, 0.000000]
            - [-1.375329, -0.999235]
            - [-0.525329, -1.616796]
            - [0.525329, -1.616796]
            - [1.375329, -0.999235]

    S1:
      z: 175.000000
      polygons:
        outer:
          weight: 1.000000
          vertices:
            - [2.000000, 0.000000]
            - [1.618034, 1.175571]
            - [0.618034, 1.902113]
            - [-0.618034, 1.902113]
            - [-1.618034, 1.175571]
            - [-2.000000, 0.000000]
            - [-1.618034, -1.175571]
            - [-0.618034, -1.902113]
            - [0.618034, -1.902113]
            - [1.618034, -1.175571]
        inner_void:
          weight: 0.000000
          vertices:
            - [1.700000, 0.000000]
            - [1.375329, 0.999235]
            - [0.525329, 1.616796]
            - [-0.525329, 1.616796]
            - [-1.375329, 0.999235]
            - [-1.700000, 0.000000]
            - [-1.375329, -0.999235]
            - [-0.525329, -1.616796]
            - [0.525329, -1.616796]
            - [1.375329, -0.999235]
  weight_laws:
     # Realistic smooth degradation window (double-sigmoid):
     # - maximum degradation amplitude = 40%
     # - degradation band approximately from z=2 m to z=8 m
     # - k=2.0 controls transition steepness at band edges
     # - w(z) remains in (0, 1] for this parameter set

    - 'outer,outer: 1.0 - 0.40 * (1.0/(1.0 + np.exp(-2.0*(z - 2.0))) - 1.0/(1.0 + np.exp(-2.0*(z - 8.0))))'
    
    # Alternative Gaussian law (commented):
    # - stronger peak degradation (60%) centered at z=5 m
    # - wider spread (sigma=4 m), smoother long tails
    # - useful as high-degradation sensitivity scenario
  
    #- 'outer,outer: 1.0 - 0.60*np.exp(-((z-5.0)**2)/(2*(4.0**2)))'

